name: Publish Docker Image

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - "feat/**"
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/hiveforge
          tags: |
            type=ref,event=branch,prefix=branch-
            type=sha,prefix=sha-
            type=ref,event=tag
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and publish image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  mcp-client-tarball:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Package MCP client tarball
        run: npm run package:mcp-client

      - name: Upload MCP client tarball
        uses: actions/upload-artifact@v4
        with:
          name: hiveforge-mcp-client-tarball
          path: dist/packages/hiveforge-mcp-client-*.tgz
          if-no-files-found: error
