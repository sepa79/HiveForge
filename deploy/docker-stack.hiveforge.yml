services:
  hiveforge:
    image: ${HIVEFORGE_IMAGE:-ghcr.io/sepa79/hiveforge:latest}
    environment:
      HIVEFORGE_BASE_DIR: /hf
      HIVEFORGE_AUTH_TOKEN: ${HIVEFORGE_AUTH_TOKEN:-}
      HIVEFORGE_BIND_HOST: 0.0.0.0
      HIVEFORGE_PORT: "3000"
      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      NO_PROXY: ${NO_PROXY:-}
      http_proxy: ${http_proxy:-}
      https_proxy: ${https_proxy:-}
      no_proxy: ${no_proxy:-}
    ports:
      - target: 3000
        published: ${HIVEFORGE_HTTP_PORT:-3000}
        protocol: tcp
        mode: ingress
    volumes:
      - hiveforge-data:/hf
      - /var/run/docker.sock:/var/run/docker.sock
    deploy:
      replicas: 1
      restart_policy:
        condition: any
      placement:
        constraints:
          - node.role == manager

volumes:
  hiveforge-data:
