version: "3.8"

services:
  hiveforge:
    image: ${HIVEFORGE_IMAGE:-ghcr.io/sepa79/hiveforge:latest}
    restart: unless-stopped
    environment:
      HIVEFORGE_AUTH_TOKEN: ${HIVEFORGE_AUTH_TOKEN:-}
      # Used only when HiveForge creates a missing /hf/environments.yaml on first start.
      HIVEFORGE_ENVIRONMENT_NAME: ${HIVEFORGE_ENVIRONMENT_NAME:-}
      HIVEFORGE_ENVIRONMENT_DESCRIPTION: ${HIVEFORGE_ENVIRONMENT_DESCRIPTION:-}
      HIVEFORGE_BIND_HOST: 0.0.0.0
      HIVEFORGE_PORT: "3000"
      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      NO_PROXY: ${NO_PROXY:-}
      http_proxy: ${http_proxy:-}
      https_proxy: ${https_proxy:-}
      no_proxy: ${no_proxy:-}
    ports:
      - target: 3000
        published: ${HIVEFORGE_HTTP_PORT:-3000}
        protocol: tcp
        mode: ingress
    volumes:
      # Change this host path before deploy when HiveForge data should live elsewhere.
      - type: bind
        source: /opt/hiveforge
        target: /hf
      - /var/run/docker.sock:/var/run/docker.sock
    deploy:
      replicas: 1
      restart_policy:
        condition: any
      placement:
        constraints:
          - node.role == manager
