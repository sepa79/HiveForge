services:
  hiveforge:
    image: ${HIVEFORGE_IMAGE:-ghcr.io/sepa79/hiveforge:latest}
    restart: unless-stopped
    ports:
      - "${HIVEFORGE_HTTP_BIND:-0.0.0.0:3000}:3000"
    environment:
      HIVEFORGE_BASE_DIR: /hf
      HIVEFORGE_AUTH_TOKEN: ${HIVEFORGE_AUTH_TOKEN:-}
      HIVEFORGE_BIND_HOST: 0.0.0.0
      HIVEFORGE_PORT: "3000"
    volumes:
      - ./:/hf
      - /var/run/docker.sock:/var/run/docker.sock
