# HiveForge assisted Docker Compose template.
#
# Copy this file to docker-compose.yml in an operator-owned HiveForge directory.
# HiveForge initializes missing runtime files under that directory on first
# start. Set HIVEFORGE_AUTH_TOKEN in .env when you want an operator-provided
# token; otherwise HiveForge creates ./auth-token once.

services:
  hiveforge:
    image: ghcr.io/sepa79/hiveforge:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      HIVEFORGE_BASE_DIR: /hf
      HIVEFORGE_AUTH_TOKEN: ${HIVEFORGE_AUTH_TOKEN:-}
      HIVEFORGE_BIND_HOST: 0.0.0.0
      HIVEFORGE_PORT: "3000"
      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      NO_PROXY: ${NO_PROXY:-}
      http_proxy: ${http_proxy:-}
      https_proxy: ${https_proxy:-}
      no_proxy: ${no_proxy:-}
    volumes:
      - ./:/hf
      - /var/run/docker.sock:/var/run/docker.sock
