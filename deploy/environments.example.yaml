current: docker
environments:
  - id: docker
    name: Docker host
    description: Single Docker host with HiveForge runtime files mounted from /opt/hiveforge.
    kind: docker
    capabilities:
      runtime:
        - docker-single
      managedRoot:
        shared: false
        bindSourceRoot: /opt/hiveforge
        nodes:
          - docker
    policy:
      projects:
        - id: hivewatch
          profiles:
            - normal
            - test
          actions:
            - deploy
            - remove
            - update
