openapi: 3.1.0
info:
  title: HiveForge POC API
  version: 0.1.0
  description: >
    POC API. The target managed-service v1 contract is release-driven and is
    defined in docs/specs/releases.md; generic lifecycle start_action is not
    enough for release promotion semantics.
servers:
  - url: http://localhost:3000
paths:
  /health:
    get:
      summary: Read public process health
      operationId: getHealth
      responses:
        "200":
          description: HiveForge process is serving HTTP
          content:
            application/json:
              schema:
                type: object
                required: [status, hiveforge]
                properties:
                  status:
                    type: string
                    enum: [ok]
                  hiveforge:
                    $ref: "#/components/schemas/HiveForgeInfo"
  /info:
    get:
      summary: Read HiveForge service info
      operationId: getHiveForgeInfo
      responses:
        "200":
          description: HiveForge service info
          content:
            application/json:
              schema:
                type: object
                required: [hiveforge]
                properties:
                  hiveforge:
                    $ref: "#/components/schemas/HiveForgeInfo"
  /hiveforge/update:
    get:
      summary: Check whether a newer HiveForge release is available
      operationId: checkHiveForgeUpdate
      responses:
        "200":
          description: HiveForge update check result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SelfUpdateCheckResult"
        "400":
          description: HiveForge update check failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      summary: Start HiveForge self-update to the latest released image
      operationId: startHiveForgeUpdate
      responses:
        "200":
          description: HiveForge self-update accepted or already current
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SelfUpdateStartResult"
        "400":
          description: HiveForge self-update failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /projects:
    get:
      summary: List registered projects
      operationId: listProjects
      responses:
        "200":
          description: Registered projects
          content:
            application/json:
              schema:
                type: object
                required: [projects]
                properties:
                  projects:
                    type: array
                    items:
                      $ref: "#/components/schemas/Project"
  /environments:
    get:
      summary: List known environments for this HiveForge instance
      operationId: listEnvironments
      responses:
        "200":
          description: Known environments
          content:
            application/json:
              schema:
                type: object
                required: [current, known]
                properties:
                  current:
                    $ref: "#/components/schemas/Environment"
                  known:
                    type: array
                    items:
                      $ref: "#/components/schemas/Environment"
  /environments/refresh:
    post:
      summary: Refresh the current environment from the local runtime provider
      operationId: refreshEnvironment
      responses:
        "200":
          description: Refreshed current environment
          content:
            application/json:
              schema:
                type: object
                required: [current, known]
                properties:
                  current:
                    $ref: "#/components/schemas/Environment"
                  known:
                    type: array
                    items:
                      $ref: "#/components/schemas/Environment"
        "400":
          description: Environment refresh failed
          content:
            application/json:
              schema:
                type: object
                required: [error]
                properties:
                  error:
                    type: string
  /repositories/inspect:
    post:
      summary: Inspect a repository for HiveForge deployability without authorizing deployment
      operationId: inspectRepository
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RepositoryInspectionRequest"
      responses:
        "200":
          description: Repository inspection result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RepositoryInspectionResult"
  /projects/register:
    post:
      summary: Inspect and register a deployable project repository/ref
      operationId: registerProject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectRegistrationRequest"
      responses:
        "200":
          description: Registered project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectRegistrationResult"
  /projects/{projectId}/runtime-env:
    get:
      summary: List non-secret runtime env entries for one project
      operationId: listProjectRuntimeEnv
      parameters:
        - $ref: "#/components/parameters/projectId"
      responses:
        "200":
          description: Project runtime env entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectRuntimeEnv"
    put:
      summary: Set non-secret runtime env values for future validation/actions
      description: >
        Set non-secret runtime env values for one project/profile scope. Call
        before validation/deployment when the selected project or profile needs
        these values. Changes are not retroactive and do not update an already
        deployed service. Do not use this for secrets.
      operationId: setProjectRuntimeEnv
      parameters:
        - $ref: "#/components/parameters/projectId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RuntimeEnvSetRequest"
      responses:
        "200":
          description: Updated runtime env entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeEnvMutationResult"
  /projects/{projectId}/runtime-env/unset:
    post:
      summary: Unset non-secret runtime env values for one project scope
      operationId: unsetProjectRuntimeEnv
      parameters:
        - $ref: "#/components/parameters/projectId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RuntimeEnvUnsetRequest"
      responses:
        "200":
          description: Updated runtime env entry after removing keys
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeEnvMutationResult"
  /environments/{environmentId}/policy/projects/{projectId}:
    put:
      summary: Set explicit environment policy for one project
      operationId: setEnvironmentProjectPolicy
      parameters:
        - name: environmentId
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Identifier"
        - $ref: "#/components/parameters/projectId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EnvironmentProjectPolicyRequest"
      responses:
        "200":
          description: Updated environment project policy
          content:
            application/json:
              schema:
                type: object
                required: [environmentId, project]
                properties:
                  environmentId:
                    $ref: "#/components/schemas/Identifier"
                  project:
                    $ref: "#/components/schemas/EnvironmentProjectPolicy"
  /deployments:
    get:
      summary: List deployment inventory for the current environment
      operationId: listDeployments
      responses:
        "200":
          description: Current deployment inventory
          content:
            application/json:
              schema:
                type: object
                required: [deployments]
                properties:
                  deployments:
                    type: array
                    items:
                      $ref: "#/components/schemas/Deployment"
  /deployments/runtime-status:
    post:
      summary: Check live Docker runtime status for a labelled deployment
      description: >
        Looks up Docker containers and, on Swarm environments, services by the
        single HiveForge deployment label only. This endpoint does not
        infer deployment ownership from names.
      operationId: checkDeploymentRuntimeStatus
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeploymentRuntimeStatusRequest"
      responses:
        "200":
          description: Live runtime status for matching Docker objects
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeploymentRuntimeStatusResult"
  /deployments/diagnostics:
    post:
      summary: Diagnose one deployment across HiveForge state, Docker, compose, and runtime paths
      description: >
        Aggregates explicit HiveForge state, Docker runtime status selected by
        hiveforge.deployment label, the recorded compose artifact, compose
        bind-source validation, HiveForge runtime diagnostics, and a correlated
        expected-vs-actual analysis. This endpoint does not infer ownership from
        Docker object names and does not re-render compose from source.
      operationId: diagnoseDeployment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeploymentRuntimeStatusRequest"
      responses:
        "200":
          description: Deployment diagnostics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeploymentDiagnosticsResult"
  /deployments/{operationId}/compose:
    get:
      summary: Read the rendered compose artifact recorded for an operation
      description: >
        Returns the compose artifact recorded in the action journal. HiveForge
        does not re-render compose from current source when no artifact exists.
        Secret-looking lines are redacted before response content is returned.
      operationId: getDeploymentCompose
      parameters:
        - name: operationId
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        "200":
          description: Recorded rendered compose artifact, or an explicit missing result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeploymentComposeResult"
  /diagnostics/runtime:
    get:
      summary: Diagnose HiveForge runtime paths and managed-root mapping
      operationId: diagnoseHiveForgeRuntime
      responses:
        "200":
          description: Runtime diagnostics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeDiagnosticsReport"
  /operations:
    get:
      summary: List operations retained by this HiveForge process
      operationId: listOperations
      responses:
        "200":
          description: Operation list
          content:
            application/json:
              schema:
                type: object
                required: [operations]
                properties:
                  operations:
                    type: array
                    items:
                      $ref: "#/components/schemas/Operation"
  /operations/{operationId}:
    get:
      summary: Read one operation status and logs
      operationId: readOperation
      parameters:
        - name: operationId
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        "200":
          description: Operation status and logs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Operation"
  /operations/projects/{projectId}/actions/{component}/{action}:
    post:
      summary: Start a lifecycle action asynchronously and return an operation id
      operationId: startActionOperation
      parameters:
        - $ref: "#/components/parameters/projectId"
        - name: component
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Identifier"
        - name: action
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/LifecycleAction"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ActionRequest"
      responses:
        "200":
          description: Started operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Operation"
  /operations/projects/{projectId}/releases/{component}/{action}:
    post:
      summary: Prepare a release/image-tag deployment plan
      description: Internal transport for MCP prepare_release_deploy. This validates and resolves release inputs but does not execute deployment actions.
      operationId: prepareReleaseDeployment
      parameters:
        - $ref: "#/components/parameters/projectId"
        - name: component
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Identifier"
        - name: action
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/LifecycleAction"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReleaseDeployRequest"
      responses:
        "200":
          description: Prepared release deployment plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReleaseDeployResult"
  /projects/{projectId}/inspect:
    post:
      summary: Checkout and inspect project manifests
      operationId: inspectProject
      parameters:
        - $ref: "#/components/parameters/projectId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefRequest"
      responses:
        "200":
          description: Inspection result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InspectionResult"
  /projects/{projectId}/validate:
    post:
      summary: Checkout, inspect, and validate profile eligibility and declared runtime requirements
      operationId: validateProject
      parameters:
        - $ref: "#/components/parameters/projectId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ActionRequest"
      responses:
        "200":
          description: Validation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationResult"
  /projects/{projectId}/deploy-prerequisites:
    post:
      summary: Explain deploy prerequisites without provisioning resources
      operationId: explainDeployPrerequisites
      parameters:
        - $ref: "#/components/parameters/projectId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeployPrerequisitesRequest"
      responses:
        "200":
          description: Deploy prerequisites checklist
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeployPrerequisitesReport"
  /projects/{projectId}/actions/{component}/{action}:
    post:
      summary: Checkout, inspect, validate, and run a declared component action
      operationId: runAction
      parameters:
        - $ref: "#/components/parameters/projectId"
        - name: component
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Identifier"
        - name: action
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/LifecycleAction"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ActionRequest"
      responses:
        "200":
          description: Action result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionResult"
  /journal:
    get:
      summary: Read operation journal
      operationId: readJournal
      responses:
        "200":
          description: Journal events
          content:
            application/json:
              schema:
                type: object
                required: [events]
                properties:
                  events:
                    type: array
                    items:
                      $ref: "../journal/event.schema.json"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  parameters:
    projectId:
      name: projectId
      in: path
      required: true
      schema:
        $ref: "#/components/schemas/Identifier"
  schemas:
    HiveForgeInfo:
      type: object
      required: [name, version]
      properties:
        name:
          type: string
        version:
          type: string
    ErrorResponse:
      type: object
      additionalProperties: false
      required: [error]
      properties:
        error:
          type: string
    SelfUpdateMode:
      type: string
      enum: [docker-compose, swarm-service]
    SelfUpdateCheckResult:
      type: object
      additionalProperties: false
      required: [currentVersion, releasePublished, updateAvailable]
      properties:
        currentVersion:
          type: string
        releasePublished:
          type: boolean
        latestVersion:
          type: string
        latestTag:
          type: string
        releaseUrl:
          type: string
        updateAvailable:
          type: boolean
    SelfUpdateStartResult:
      allOf:
        - $ref: "#/components/schemas/SelfUpdateCheckResult"
        - type: object
          additionalProperties: false
          required: [status]
          properties:
            status:
              type: string
              enum: [no_release, up_to_date, started]
            mode:
              $ref: "#/components/schemas/SelfUpdateMode"
            targetImage:
              type: string
            helperContainerId:
              type: string
    Identifier:
      type: string
      pattern: "^[a-z][a-z0-9-]*$"
    LifecycleAction:
      type: string
      enum: [deploy, remove, purge, update, upgrade]
    Project:
      type: object
      required: [id, name, source, repository, approvedRefs]
      properties:
        id:
          $ref: "#/components/schemas/Identifier"
        name:
          type: string
        source:
          type: string
          description: local-git and http-git are development/internal Git tooling, not the managed-service release contract.
          enum: [github, local-git, http-git]
        repository:
          type: string
        approvedRefs:
          type: array
          items:
            type: string
    RefRequest:
      type: object
      additionalProperties: false
      required: [gitRef]
      properties:
        gitRef:
          type: string
          minLength: 1
    ActionRequest:
      type: object
      additionalProperties: false
      required: [gitRef]
      properties:
        gitRef:
          type: string
          minLength: 1
        profile:
          $ref: "#/components/schemas/Identifier"
        deploymentName:
          $ref: "#/components/schemas/Identifier"
    DeployPrerequisitesRequest:
      type: object
      additionalProperties: false
      required: [gitRef, component, action]
      properties:
        gitRef:
          type: string
          minLength: 1
        component:
          $ref: "#/components/schemas/Identifier"
        action:
          $ref: "#/components/schemas/LifecycleAction"
        profile:
          $ref: "#/components/schemas/Identifier"
        deploymentMode:
          type: string
          enum: [action, release]
        vars:
          type: object
          additionalProperties:
            type: string
        releaseVars:
          type: object
          additionalProperties:
            type: string
        images:
          type: array
          items:
            $ref: "#/components/schemas/ReleaseImageTemplate"
        artifact:
          $ref: "#/components/schemas/ReleaseArtifactTemplate"
    PrerequisiteItem:
      type: object
      additionalProperties: false
      required: [type, status, reason]
      properties:
        type:
          type: string
        status:
          type: string
          enum: [present, missing, unknown, not_applicable]
        required:
          type: string
        reason:
          type: string
    DeployPrerequisitesReport:
      type: object
      additionalProperties: false
      required: [ready, manualPrerequisites, hiveforgePrerequisites, releasePrerequisites]
      properties:
        ready:
          type: boolean
        environment:
          type: object
          additionalProperties: false
          required: [id, name, kind]
          properties:
            id:
              $ref: "#/components/schemas/Identifier"
            name:
              type: string
            kind:
              type: string
        manualPrerequisites:
          type: array
          items:
            $ref: "#/components/schemas/PrerequisiteItem"
        hiveforgePrerequisites:
          type: array
          items:
            $ref: "#/components/schemas/PrerequisiteItem"
        releasePrerequisites:
          type: array
          items:
            $ref: "#/components/schemas/PrerequisiteItem"
    RuntimeEnvName:
      type: string
      pattern: "^(?!HIVEFORGE_)[A-Z][A-Z0-9_]*$"
    RuntimeEnvValues:
      type: object
      propertyNames:
        $ref: "#/components/schemas/RuntimeEnvName"
      additionalProperties:
        type: string
    RuntimeEnvEntry:
      type: object
      additionalProperties: false
      required: [projectId, values]
      properties:
        projectId:
          $ref: "#/components/schemas/Identifier"
        profile:
          $ref: "#/components/schemas/Identifier"
        values:
          $ref: "#/components/schemas/RuntimeEnvValues"
    ProjectRuntimeEnv:
      type: object
      additionalProperties: false
      required: [projectId, entries]
      properties:
        projectId:
          $ref: "#/components/schemas/Identifier"
        entries:
          type: array
          items:
            $ref: "#/components/schemas/RuntimeEnvEntry"
    RuntimeEnvSetRequest:
      type: object
      additionalProperties: false
      required: [values]
      properties:
        profile:
          $ref: "#/components/schemas/Identifier"
        values:
          $ref: "#/components/schemas/RuntimeEnvValues"
    RuntimeEnvUnsetRequest:
      type: object
      additionalProperties: false
      required: [keys]
      properties:
        profile:
          $ref: "#/components/schemas/Identifier"
        keys:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/RuntimeEnvName"
          uniqueItems: true
    RuntimeEnvMutationResult:
      type: object
      additionalProperties: false
      required: [projectId, values]
      properties:
        projectId:
          $ref: "#/components/schemas/Identifier"
        profile:
          $ref: "#/components/schemas/Identifier"
        values:
          $ref: "#/components/schemas/RuntimeEnvValues"
        updatedKeys:
          type: array
          items:
            $ref: "#/components/schemas/RuntimeEnvName"
        removedKeys:
          type: array
          items:
            $ref: "#/components/schemas/RuntimeEnvName"
    ReleaseDeployRequest:
      type: object
      additionalProperties: false
      required: [releaseVars]
      description: Provide either explicit images or an artifact with image templates. Provide either project metadata for pure preparation or gitRef for checkout-backed managed file preparation.
      anyOf:
        - required: [images]
        - required: [artifact]
      oneOf:
        - required: [project]
        - required: [gitRef]
      properties:
        gitRef:
          type: string
          minLength: 1
        profile:
          $ref: "#/components/schemas/Identifier"
        project:
          type: object
          additionalProperties: false
          required: [id]
          properties:
            id:
              $ref: "#/components/schemas/Identifier"
            vars:
              type: object
              additionalProperties:
                type: string
            profiles:
              type: array
              items:
                type: object
        vars:
          type: object
          description: Operator/environment deployment var overrides.
          additionalProperties:
            type: string
        releaseVars:
          type: object
          additionalProperties:
            type: string
        images:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/ReleaseImageTemplate"
        artifact:
          $ref: "#/components/schemas/ReleaseArtifactTemplate"
        requiredFiles:
          type: array
          description: Runtime files that must exist under the managed project root after managedPaths preparation.
          items:
            type: string
            minLength: 1
    ReleaseArtifactTemplate:
      type: object
      additionalProperties: false
      required: [images]
      properties:
        env:
          type: object
          additionalProperties:
            type: string
        images:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/ReleaseImageTemplate"
    ReleaseImageTemplate:
      type: object
      additionalProperties: false
      required: [name, image, application]
      properties:
        name:
          type: string
          minLength: 1
        image:
          type: string
          minLength: 1
        application:
          type: boolean
    ReleaseDeployResult:
      type: object
      required: [plan]
      properties:
        environmentId:
          $ref: "#/components/schemas/Identifier"
        inspection:
          type: object
        managedFiles:
          type: object
        releaseVarsFile:
          type: string
        plan:
          type: object
          required: [projectId, component, action, vars, images]
          properties:
            projectId:
              $ref: "#/components/schemas/Identifier"
            component:
              $ref: "#/components/schemas/Identifier"
            action:
              $ref: "#/components/schemas/LifecycleAction"
            profile:
              $ref: "#/components/schemas/Identifier"
            vars:
              type: object
              additionalProperties:
                type: string
            images:
              type: array
              items:
                type: object
            env:
              type: object
              additionalProperties:
                type: string
    EnvironmentProjectPolicyRequest:
      type: object
      additionalProperties: false
      required: [actions]
      properties:
        profiles:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/Identifier"
          uniqueItems: true
        actions:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/LifecycleAction"
          uniqueItems: true
    EnvironmentProjectPolicy:
      type: object
      required: [id, actions]
      properties:
        id:
          $ref: "#/components/schemas/Identifier"
        profiles:
          type: array
          items:
            $ref: "#/components/schemas/Identifier"
        actions:
          type: array
          items:
            $ref: "#/components/schemas/LifecycleAction"
    Environment:
      type: object
      required: [id, name, kind, capabilities, policy]
      properties:
        id:
          $ref: "#/components/schemas/Identifier"
        name:
          type: string
        description:
          type: string
        kind:
          type: string
          enum: [local-docker, docker, swarm]
        capabilities:
          $ref: "#/components/schemas/EnvironmentCapabilities"
        nodes:
          type: array
          items:
            $ref: "#/components/schemas/EnvironmentNode"
        vars:
          type: object
          additionalProperties:
            type: string
        policy:
          type: object
          required: [projects]
          properties:
            projects:
              type: array
              items:
                $ref: "#/components/schemas/EnvironmentProjectPolicy"
    EnvironmentCapabilities:
      type: object
      additionalProperties: false
      required: [runtime, managedRoot]
      properties:
        runtime:
          type: array
          minItems: 1
          items:
            type: string
            enum: [docker-single, docker-swarm]
          uniqueItems: true
        managedRoot:
          $ref: "#/components/schemas/ManagedRootCapability"
        bindSources:
          $ref: "#/components/schemas/BindSourceCapability"
        placement:
          type: boolean
    EnvironmentNode:
      type: object
      additionalProperties: false
      required: [id, hostname, role, availability, status, labels]
      properties:
        id:
          type: string
          minLength: 1
        hostname:
          type: string
        role:
          type: string
          enum: [manager, worker]
        availability:
          type: string
          enum: [active, pause, drain]
        status:
          type: string
        labels:
          type: object
          additionalProperties:
            type: string
    ManagedRootCapability:
      type: object
      additionalProperties: false
      required: [shared]
      properties:
        shared:
          type: boolean
        nodes:
          type: array
          items:
            type: string
          uniqueItems: true
        bindSourceRoot:
          type: string
    BindSourceCapability:
      type: object
      additionalProperties: false
      required: [allowed]
      properties:
        allowed:
          type: array
          items:
            type: string
          uniqueItems: true
    PathDiagnostic:
      type: object
      additionalProperties: false
      required: [path, status, readable, writable]
      properties:
        path:
          type: string
        status:
          type: string
          enum: [present, missing, inaccessible]
        readable:
          type: boolean
        writable:
          type: boolean
        reason:
          type: string
    RuntimeDiagnosticsReport:
      type: object
      additionalProperties: false
      required: [derivedPaths, managedRoot, actionContractPaths]
      properties:
        runtimeRoot:
          $ref: "#/components/schemas/PathDiagnostic"
        derivedPaths:
          type: object
          additionalProperties: false
          required: [registry, workspace, journal, dataRoot, runtimeEnv, stateDb]
          properties:
            registry:
              $ref: "#/components/schemas/PathDiagnostic"
            environments:
              $ref: "#/components/schemas/PathDiagnostic"
            workspace:
              $ref: "#/components/schemas/PathDiagnostic"
            journal:
              $ref: "#/components/schemas/PathDiagnostic"
            dataRoot:
              $ref: "#/components/schemas/PathDiagnostic"
            runtimeEnv:
              $ref: "#/components/schemas/PathDiagnostic"
            stateDb:
              $ref: "#/components/schemas/PathDiagnostic"
        environment:
          type: object
          additionalProperties: false
          required: [id, name, kind]
          properties:
            id:
              $ref: "#/components/schemas/Identifier"
            name:
              type: string
            kind:
              type: string
        managedRoot:
          type: object
          additionalProperties: false
          required: [controlPlanePath, shared, visibilityStatus, reason]
          properties:
            controlPlanePath:
              type: string
            bindSourceRoot:
              type: string
            managedDataBindSourceRoot:
              type: string
            shared:
              type: boolean
            nodes:
              type: array
              items:
                type: string
            visibilityStatus:
              type: string
              enum: [configured, unknown]
            reason:
              type: string
        actionContractPaths:
          type: object
          additionalProperties: false
          required: [exposedToProjectActions, hiddenFromProjectActions]
          properties:
            exposedToProjectActions:
              type: array
              items:
                type: string
            hiddenFromProjectActions:
              type: array
              items:
                type: string
    DeploymentRuntimeStatusRequest:
      type: object
      additionalProperties: false
      properties:
        deploymentId:
          type: string
          minLength: 1
        projectId:
          $ref: "#/components/schemas/Identifier"
        component:
          $ref: "#/components/schemas/Identifier"
        profile:
          $ref: "#/components/schemas/Identifier"
      anyOf:
        - required: [deploymentId]
        - required: [projectId, component]
    DeploymentRuntimeStatusResult:
      type: object
      additionalProperties: false
      required: [summary, requiredLabels, containers, services]
      properties:
        deploymentId:
          type: string
        deploymentName:
          $ref: "#/components/schemas/Identifier"
        projectId:
          $ref: "#/components/schemas/Identifier"
        component:
          $ref: "#/components/schemas/Identifier"
        profile:
          $ref: "#/components/schemas/Identifier"
        summary:
          type: string
          enum: [running, unhealthy, exited, missing, unknown]
        requiredLabels:
          type: object
          additionalProperties:
            type: string
          description: >
            Exact Docker label used for lookup: hiveforge.deployment=<deploymentId>.
        containers:
          type: array
          items:
            $ref: "#/components/schemas/RuntimeContainerStatus"
        services:
          type: array
          items:
            $ref: "#/components/schemas/RuntimeServiceStatus"
        reason:
          type: string
    RuntimeContainerStatus:
      type: object
      additionalProperties: false
      required: [id, name, image, state, status, labels, mounts]
      properties:
        id:
          type: string
        name:
          type: string
        image:
          type: string
        state:
          type: string
        status:
          type: string
        health:
          type: string
        restartCount:
          type: integer
        exitCode:
          type: integer
        error:
          type: string
        startedAt:
          type: string
        finishedAt:
          type: string
        ports:
          type: string
        labels:
          type: object
          additionalProperties:
            type: string
        mounts:
          type: array
          items:
            type: object
            additionalProperties: false
            properties:
              source:
                type: string
              destination:
                type: string
              mode:
                type: string
              type:
                type: string
    RuntimeServiceStatus:
      type: object
      additionalProperties: false
      required: [id, name, image, labels, tasks]
      properties:
        id:
          type: string
        name:
          type: string
        image:
          type: string
        mode:
          type: string
        replicas:
          type: string
        labels:
          type: object
          additionalProperties:
            type: string
        tasks:
          type: array
          items:
            $ref: "#/components/schemas/RuntimeServiceTaskStatus"
    RuntimeServiceTaskStatus:
      type: object
      additionalProperties: false
      required: [id, name, image]
      properties:
        id:
          type: string
        name:
          type: string
        image:
          type: string
        node:
          type: string
        desiredState:
          type: string
        currentState:
          type: string
        error:
          type: string
        ports:
          type: string
    DeploymentDiagnosticsResult:
      type: object
      additionalProperties: false
      required: [selector, state, runtime, composeValidation, hiveforge, analysis]
      properties:
        selector:
          $ref: "#/components/schemas/DeploymentRuntimeStatusRequest"
        state:
          oneOf:
            - type: object
              additionalProperties: false
              required: [status, deployment]
              properties:
                status:
                  type: string
                  enum: [present]
                deployment:
                  $ref: "#/components/schemas/Deployment"
            - type: object
              additionalProperties: false
              required: [status, reason]
              properties:
                status:
                  type: string
                  enum: [missing]
                reason:
                  type: string
        runtime:
          $ref: "#/components/schemas/DeploymentRuntimeStatusResult"
        compose:
          $ref: "#/components/schemas/DeploymentComposeResult"
        composeValidation:
          oneOf:
            - type: object
              additionalProperties: false
              required: [status, result]
              properties:
                status:
                  type: string
                  enum: [checked]
                result:
                  $ref: "#/components/schemas/ComposeBindSourceValidationResult"
            - type: object
              additionalProperties: false
              required: [status, reason]
              properties:
                status:
                  type: string
                  enum: [not_checked]
                reason:
                  type: string
        hiveforge:
          $ref: "#/components/schemas/RuntimeDiagnosticsReport"
        analysis:
          $ref: "#/components/schemas/DeploymentDiagnosticsAnalysis"
    DeploymentDiagnosticsAnalysis:
      type: object
      additionalProperties: false
      required: [summary, expected, actual, findings]
      properties:
        summary:
          type: string
          enum: [ok, degraded, missing, unknown]
        expected:
          type: object
          additionalProperties: false
          required: [requiredLabels, services]
          properties:
            requiredLabels:
              type: object
              additionalProperties:
                type: string
            services:
              type: array
              items:
                $ref: "#/components/schemas/ComposeServiceEvidence"
        actual:
          type: object
          additionalProperties: false
          required: [containers, services]
          properties:
            containers:
              type: array
              items:
                type: object
                additionalProperties: false
                required: [name, image, state]
                properties:
                  name:
                    type: string
                  composeService:
                    type: string
                  image:
                    type: string
                  state:
                    type: string
                  health:
                    type: string
                  restartCount:
                    type: integer
                  exitCode:
                    type: integer
                  error:
                    type: string
            services:
              type: array
              items:
                type: object
                additionalProperties: false
                required: [name, image, tasks]
                properties:
                  name:
                    type: string
                  composeService:
                    type: string
                  image:
                    type: string
                  replicas:
                    type: string
                  tasks:
                    type: array
                    items:
                      type: object
                      additionalProperties: false
                      required: [name]
                      properties:
                        name:
                          type: string
                        node:
                          type: string
                        desiredState:
                          type: string
                        currentState:
                          type: string
                        error:
                          type: string
        findings:
          type: array
          items:
            $ref: "#/components/schemas/DeploymentDiagnosticFinding"
    DeploymentDiagnosticFinding:
      type: object
      additionalProperties: false
      required: [severity, type, message]
      properties:
        severity:
          type: string
          enum: [info, warning, error]
        type:
          type: string
          enum:
            - missing_state
            - missing_resource
            - unhealthy_resource
            - placement_mismatch
            - bind_mount_error
            - restart_loop
            - repeated_task_failures
            - last_exit_hint
            - unknown_ownership
        message:
          type: string
        service:
          type: string
        runtimeResource:
          type: string
        node:
          type: string
        source:
          type: string
        target:
          type: string
        evidence:
          type: array
          items:
            type: string
    ComposeBindSourceValidationResult:
      type: object
      additionalProperties: false
      required: [ok, composeFile, allowedBindSources, services, issues]
      properties:
        ok:
          type: boolean
        composeFile:
          type: string
        bindSourceDir:
          type: string
        allowedBindSources:
          type: array
          items:
            type: string
        services:
          type: array
          items:
            $ref: "#/components/schemas/ComposeServiceEvidence"
        issues:
          type: array
          items:
            type: object
            additionalProperties: false
            required: [service, source, reason]
            properties:
              service:
                type: string
              source:
                type: string
              reason:
                type: string
    ComposeServiceEvidence:
      type: object
      additionalProperties: false
      required: [service, bindSources, bindMounts, placementConstraints]
      properties:
        service:
          type: string
        image:
          type: string
        bindSources:
          type: array
          items:
            type: string
        bindMounts:
          type: array
          items:
            type: object
            additionalProperties: false
            required: [source, type]
            properties:
              source:
                type: string
              target:
                type: string
              type:
                type: string
                enum: [bind]
        placementConstraints:
          type: array
          items:
            type: string
    DeploymentComposeResult:
      type: object
      additionalProperties: false
      required: [operationId, status, source, redacted]
      properties:
        operationId:
          type: string
        status:
          type: string
          enum: [present, missing]
        source:
          type: string
          enum: [operation_artifact, none]
        artifact:
          $ref: "#/components/schemas/DeploymentComposeArtifact"
        content:
          type: string
        redacted:
          type: boolean
        reason:
          type: string
    DeploymentComposeArtifact:
      type: object
      additionalProperties: false
      required:
        [name, path, mediaType, sha256, bytes, recordedAt, currentSha256, currentBytes, digestMatchesJournal]
      properties:
        name:
          type: string
          enum: [compose]
        path:
          type: string
        mediaType:
          type: string
        sha256:
          type: string
        bytes:
          type: integer
          minimum: 0
        recordedAt:
          type: string
          format: date-time
        currentSha256:
          type: string
        currentBytes:
          type: integer
          minimum: 0
        digestMatchesJournal:
          type: boolean
    RepositoryInspectionRequest:
      type: object
      additionalProperties: false
      required: [repository, gitRef]
      properties:
        repository:
          type: string
          minLength: 1
        gitRef:
          type: string
          minLength: 1
    ProjectRegistrationRequest:
      type: object
      additionalProperties: false
      required: [repository, gitRef]
      properties:
        repository:
          type: string
          minLength: 1
        gitRef:
          type: string
          minLength: 1
        registrationKind:
          type: string
          description: official registers the manifest project name as-is; development registers a separate <project>-development variant.
          enum: [official, development]
    RepositoryInspectionResult:
      type: object
      required: [operationId, repository, gitRef, deployable, components]
      properties:
        operationId:
          type: string
        repository:
          type: string
        gitRef:
          type: string
        deployable:
          type: boolean
        project:
          type: object
        components:
          type: array
          items:
            type: object
        reason:
          type: string
    ProjectRegistrationResult:
      type: object
      required: [operationId, project, deployable]
      properties:
        operationId:
          type: string
        project:
          $ref: "#/components/schemas/Project"
        deployable:
          type: boolean
          const: true
    InspectionResult:
      type: object
      required: [operationId, inspectionOperationId, projectId, repository, gitRef, components]
      properties:
        operationId:
          type: string
        inspectionOperationId:
          type: string
        projectId:
          $ref: "#/components/schemas/Identifier"
        repository:
          type: string
        gitRef:
          type: string
        components:
          type: array
          items:
            $ref: "#/components/schemas/Identifier"
    ValidationResult:
      type: object
      required: [operationId, ok, issues]
      properties:
        operationId:
          type: string
        ok:
          type: boolean
        issues:
          type: array
          items:
            type: object
    ActionResult:
      type: object
      required: [operationId, stdout, stderr]
      properties:
        operationId:
          type: string
        deploymentId:
          type: string
        stdout:
          type: string
        stderr:
          type: string
    Deployment:
      type: object
      required: [deploymentId, deploymentName, environment, project, repository, gitRef, component, status, lastAction, operationId, updatedAt]
      properties:
        deploymentId:
          type: string
        deploymentName:
          $ref: "#/components/schemas/Identifier"
        environment:
          $ref: "#/components/schemas/Identifier"
        project:
          $ref: "#/components/schemas/Identifier"
        repository:
          type: string
        gitRef:
          type: string
        component:
          $ref: "#/components/schemas/Identifier"
        profile:
          $ref: "#/components/schemas/Identifier"
        status:
          type: string
          enum: [preparing, deployed, removed, failed]
        lastAction:
          $ref: "#/components/schemas/LifecycleAction"
        operationId:
          type: string
        updatedAt:
          type: string
          format: date-time
    Operation:
      type: object
      required: [operationId, status, kind, gitRef, startedAt, logs]
      properties:
        operationId:
          type: string
        status:
          type: string
          enum: [running, succeeded, failed]
        kind:
          type: string
          enum: [lifecycle_action, repository_inspection, project_registration, project_inspection]
        projectId:
          $ref: "#/components/schemas/Identifier"
        repository:
          type: string
        gitRef:
          type: string
        component:
          $ref: "#/components/schemas/Identifier"
        action:
          $ref: "#/components/schemas/LifecycleAction"
        environmentId:
          $ref: "#/components/schemas/Identifier"
        profile:
          $ref: "#/components/schemas/Identifier"
        deploymentName:
          $ref: "#/components/schemas/Identifier"
        startedAt:
          type: string
          format: date-time
        endedAt:
          type: string
          format: date-time
        logs:
          type: array
          items:
            $ref: "#/components/schemas/OperationLogEntry"
        result:
          type: object
          properties:
            actionOperationId:
              type: string
        error:
          type: string
    OperationLogEntry:
      type: object
      required: [at, level, message]
      properties:
        at:
          type: string
          format: date-time
        level:
          type: string
          enum: [info, stdout, stderr, error]
        message:
          type: string
security:
  - bearerAuth: []
