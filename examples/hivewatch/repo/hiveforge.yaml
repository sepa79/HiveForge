kind: project
project:
  name: hivewatch
  repository: https://github.com/sepa79/HiveWatch.git
  actions:
    - deploy
    - remove
    - update
  vars:
    imageRepository.project: ghcr.io/sepa79/hivewatch
    extRepository.docker: docker.io
    extRepository.ghcr: ghcr.io
  profiles:
    - id: normal
      runtime: docker-single
      serviceSet: normal
      requires:
        managedRoot:
          required: true
          shared: false
          node: local-docker
    - id: test
      runtime: docker-single
      serviceSet: test
      requires:
        managedRoot:
          required: true
          shared: false
          node: local-docker
components:
  - name: api
    manifest: components/api/hiveforge.yaml
artifacts:
  managedPaths:
    - name: api-config
      source: deploy/config
      target: artifacts/config
      mode: replace
