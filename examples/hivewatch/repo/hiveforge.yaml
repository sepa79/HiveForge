kind: project
project:
  name: hivewatch
  repository: https://github.com/sepa79/HiveWatch.git
  actions:
    - deploy
    - remove
    - update
  profiles:
    - id: normal
      runtime: docker-single
      serviceSet: normal
      requires:
        registry: true
        ingress: true
        managedRoots:
          - stack-root
    - id: test
      runtime: docker-single
      serviceSet: test
      requires:
        registry: true
        ingress: true
        managedRoots:
          - stack-root
components:
  - name: api
    manifest: components/api/hiveforge.yaml
artifacts:
  managedPaths:
    - name: api-config
      source: deploy/config
      target: artifacts/config
      mode: replace
