---
- name: Render HiveWatch API compose for update
  hosts: localhost
  gather_facts: false
  vars:
    hivewatch_compose_template: "{{ playbook_dir }}/templates/docker-compose.yml.j2"
    hivewatch_compose_file: "/hf/stacks/compose.yml"
    hivewatch_http_port: "{{ lookup('ansible.builtin.env', 'HIVEWATCH_API_PORT') | default('3000', true) }}"
  tasks:
    - name: Render HiveWatch Compose file
      ansible.builtin.template:
        src: "{{ hivewatch_compose_template }}"
        dest: "{{ hivewatch_compose_file }}"
        mode: "0644"
