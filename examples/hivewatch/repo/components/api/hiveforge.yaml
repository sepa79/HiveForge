kind: component
component:
  name: api
  project: hivewatch
deployment:
  adapter: ansible
  actions:
    deploy:
      playbook: ansible/deploy.yml
    remove:
      playbook: ansible/remove.yml
    update:
      playbook: ansible/update.yml
requirements:
  volumes:
    - hivewatch-api-data
  secrets:
    - hivewatch-api-token
  environment:
    - HIVEWATCH_API_PORT
